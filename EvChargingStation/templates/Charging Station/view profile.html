{% extends 'Charging Station/charging index.html' %}
{% block body %}

<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Untitled Document</title>
</head>

<body>
<form action="" method="get">
<table width="214" border="1" class="table table-bordered">
  <tr style="color:#D81324">
    <td width="58" align="center">Name</td>
    <td width="140">
      <input type="text" name="textfield" id="textfield" value="{{ data.name }} "class="form-control" required="" /></td>
  </tr>
  <tr style="color:#D81324">
    <td align="center">Email</td>
    <td>
      <input type="text" name="textfield2" id="textfield2" value="{{ data.email }}"class="form-control" required="" /></td>
  </tr>
  <tr style="color:#D81324">
    <td align="center">Contact</td>
    <td>
      <input type="text" name="textfield3" id="textfield3" value="{{ data.contact }}"class="form-control" required=""/></td>
  </tr>
  <tr style="color:#D81324">
    <td align="center">Place</td>
    <td>
      <input type="text" name="textfield4" id="textfield4" value="{{ data.place }}"class="form-control" required=""/></td>
  </tr>
  <tr>
    <td height="52" colspan="2"><div align="center">
      <a href="https://www.google.com/maps/?q={{ i.latitude }}{{ i.longitude }}"class="btn btn-success">Locate</a>
    </div></td>
    </tr>
</table>

</form>
</body>
</html>
{% endblock %}
