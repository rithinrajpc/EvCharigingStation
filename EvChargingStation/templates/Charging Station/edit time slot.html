{% extends 'Charging Station/charging index.html' %}
{% block body %}

<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Untitled Document</title>
</head>

<body>
<form action="/edit_time_slot_post/{{ data.id }}" method="post">
<table width="256" border="1" class="table table-bordered">
  <tr style="color:#D81324">
    <td width="96">Total Slot</td>
    <td width="144"><label for="textfield"></label>
     <input type="number" name="textfield" id="textfield" value="{{ data.total_slot }}" required=""/></td>
  </tr>
  <tr style="color:#D81324">
    <td>Date</td>
    <td><label for="textfield2"></label>
     <input type="date" name="textfield2" id="textfield2" value="{{ data.date }}" required=""/></td>
  </tr>
  <tr style="color:#D81324">
    <td>Start Time</td>
    <td><label for="textfield3"></label>
     <input type="time" name="textfield3" id="textfield3" value="{{ data.start_time|slice:':5' }}" required=""/></td>
  </tr>
  <tr style="color:#D81324">
    <td height="26">End Time</td>
    <td><label for="textfield4"></label>
     <input type="time" name="textfield4" id="textfield4" value="{{ data.end_time|slice:':5' }}" required=""/></td>
  </tr>
  <tr style="color:#D81324">
    <td height="51" colspan="2" align="center"><input type="submit" name="button" class="btn btn-secondary"id="button" value="Edit" /></td>
    </tr>
</table>

</form>
</body>
</html>
{% endblock %}
