{% extends 'Charging Station/charging index.html' %}
{% block body %}

<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Untitled Document</title>
</head>

<body>
<table width="254" border="1" class="table table-bordered">
  <tr style="color:#D81324">
    <th width="74" scope="col">#</th>
    <th width="79" scope="col">Slot NO</th>
    <th width="79" scope="col">&nbsp;</th>
  </tr>
    {% for i in data %}
  <tr>
    <td height="89">{{ forloop.counter }}</td>
    <td>{{ i.slot_no }}</td>
    <td align="center"><p><a href="/edit_charging_slot/{{ i.id }}" class="btn btn-primary">Edit</a></p>
    <p><a href="/delete_charging_slot/{{i.id}}"class="btn btn-danger" onclick="return confirm('Are you sure?')">Delete</a></p></td>
  </tr>
    {% endfor %}
</table>

</body>
</html>
{% endblock %}
