{% extends 'Charging Station/charging index.html' %}
{% block body %}
<h2>Payment Receipt</h2>
<div id="receiptContent" style="border:1px solid #ccc;padding:20px;width:400px;background:#fff;">
  <p><b>Receipt ID:</b> {{ receipt_id }}</p>
  <p><b>User:</b> {{ user.name }}</p>
  <p><b>Station:</b> {{ station.name }}</p>
  <p><b>Slot:</b> {{ slot.slot_no }}</p>
  <p><b>Date:</b> {{ booking.date }}</p>
  <p><b>Amount:</b> ₹{{ amount }}</p>
  <canvas id="receiptQR"></canvas>
</div>

<!-- QR Code -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script>
  new QRious({
    element: document.getElementById('receiptQR'),
    value: '{{ receipt_id }}',
    size: 120
  });
</script>

<!-- PDF Download -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  function downloadReceiptPDF() {
const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.html(document.getElementById('receiptContent'), {
      callback: function (doc) {
        doc.save('receipt_{{ receipt_id }}.pdf');
      },
      x: 10,
      y: 10,
      html2canvas: { scale: 0.7 }
    });
  }
</script>

<button onclick="downloadReceiptPDF()" class="btn btn-success">Download PDF</button>
<button onclick="window.print()" class="btn btn-primary">Print Receipt</button>
{% endblock %}
