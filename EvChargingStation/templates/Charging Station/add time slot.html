{% extends 'Charging Station/charging index.html' %}
{% block body %}

<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Untitled Document</title>
</head>

<body>
<form action="/add_time_slot_post" method="post" >
<table width="256" border="1" class="table table-bordered">
  <tr style="color:#D81324">
    <td width="96">Total Slot</td>
    <td width="144">
      <input type="text" name="textfield" id="textfield" class="form-control" required=""/></td>
  </tr>
  <tr style="color:#D81324">
    <td>Date</td>
    <td>
      <input type="date" name="textfield2" id="textfield2" class="form-control" required=""/></td>
  </tr>
  <tr style="color:#D81324">
    <td>Start Time</td>
    <td>
      <input type="time" name="textfield3" id="textfield3" class="form-control" required=""/></td>
  </tr>
  <tr style="color:#D81324">
    <td height="26">End Time</td>
    <td>
      <input type="time" name="textfield4" id="textfield4"class="form-control" required="" /></td>
  </tr>
  <tr style="color:#D81324">
    <td height="51" colspan="2" align="center"><input type="submit" name="button" id="button" value="Add" class="btn btn-success"/></td>
    </tr>
</table>

</form>
</body>
</html>
